general:
  seed: 42

wandb:
  api_key: null
  project: "DualSwin-Joint"

model:
  embed_dim_a: 512   # recognition branch
  embed_dim_b: 2     # PAD branch (live/spoof)

loss:
  margin: 0.5
  scale: 32.0
  recog_weight: 1.0
  pad_weight: 1.0

optimizer:
  lr: 1.0e-3
  weight_decay: 0.01

scheduler:
  warmup_epochs: 5
  min_lr: 1.0e-5

training:
  epochs: 100
  recog_batch_size: 128
  pad_batch_size: 64
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 20

data:
  recog_split_path: "data/recog_splits.json"
  pad_split_path: "data/pad_splits.json"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null

output:
  checkpoint_dir: "ckpts/joint/"
  best_model_name: "best_model.pth"

evaluation:
  recog_batch_size: 1024
  pad_batch_size: 128
