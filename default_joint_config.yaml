general:
  seed: 42

wandb:
  api_key: null
  project: "DualViT-Joint"

model:
model:
  model_name: "dualvit"
  pretrained: false
  branch_a_num_classes: 256
  branch_b_num_classes: 2
  head_hidden_dim: 256
  head_drop_rate: 0.5
  ckpt_path: "ckpts/recog/best_model.pth"

loss:
  margin: 0.5
  scale: 32.0

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  warmup_epochs: 0
  min_lr: 1.0e-5

training:
  epochs: 100
  recog_batch_size: 256
  pad_batch_size: 128
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 20

data:
  recog_split_path: "data/recog_splits.json"
  pad_split_path: "data/pad_splits.json"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null

output:
  checkpoint_dir: "ckpts/joint/"
  best_model_name: "best_model.pth"

evaluation:
  recog_batch_size: 1024
  pad_batch_size: 128
