general:
  seed: 42

wandb:
  api_key: null
  project: "SwinT-PAD"

model:
  embed_dim: 2

optimizer:
  lr: 1.0e-3
  weight_decay: 0.01

scheduler:
  warmup_epochs: 5
  min_lr: 1.0e-5

training:
  epochs: 50
  pad_batch_size: 64
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 10

data:
  split_path: "data/pad_splits.json"

output:
  checkpoint_dir: "ckpts/pad/"
  best_model_name: "best_model.pth"
