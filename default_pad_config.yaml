general:
  seed: 42

wandb:
  api_key: null
  project: "Dual-PAD"

data:
  split_path: "data/pad_splits.json"
  transform_name: "dual"

training:
  epochs: 40
  pad_batch_size: 256
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 10

model:
  model_name: "mobilevitv2_100.cvnets_in1k"
  pretrained: true
  shared_stages: 3
  branch_a_num_classes: 256
  branch_b_num_classes: 1
  head_hidden_dim: 256
  head_drop_rate: 0.5
  ckpt_path: null

optimizer:
  opt_name: "adam"
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  sched_name: "cosine"
  warmup_epochs: 2
  min_lr: 1.0e-5

output:
  checkpoint_dir: "ckpts/pad/"
  best_model_name: "best_model.pth"

evaluation:
  pad_batch_size: 256
