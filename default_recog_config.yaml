general:
  seed: 42

wandb:
  api_key: null
  project: "SwinT-Recognition"

model:
  embed_dim: 128

loss:
  margin: 0.5
  scale: 32.0

optimizer:
  lr: 1.0e-3
  weight_decay: 0.01

scheduler:
  warmup_epochs: 5
  min_lr: 1.0e-5

training:
  epochs: 100
  recog_batch_size: 128
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 20

data:
  split_path: "data/recog_splits.json"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null

output:
  checkpoint_dir: "ckpts/recog/"
  best_model_name: "best_model.pth"

evaluation:
  recog_batch_size: 1024
