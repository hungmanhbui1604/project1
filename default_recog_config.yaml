general:
  seed: 42

wandb:
  api_key: null
  project: "DualViT-Recognition"

model:
  model_name: "vit_small_patch16_224"
  pretrained: true
  branch_a_num_classes: 256
  branch_b_num_classes: 2
  head_hidden_dim: 256
  head_drop_rate: 0.5
  ckpt_path: null

loss:
  margin: 0.5
  scale: 32.0

optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-4

scheduler:
  warmup_epochs: 0
  min_lr: 1.0e-5

training:
  epochs: 100
  recog_batch_size: 256
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 20

data:
  split_path: "data/recog_splits.json"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null

output:
  checkpoint_dir: "ckpts/recog/"
  best_model_name: "best_model.pth"

evaluation:
  recog_batch_size: 1024
