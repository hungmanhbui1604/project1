general:
  seed: 42

data:
  recog_split_path: "data/recog_splits.json"
  pad_split_path: "data/pad_splits.json"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null
  gallery_per_id: 1
  probe_per_id: null
  transform_name: "dual"

model:
  model_name: "mobilevitv2_100.cvnets_in1k"
  pretrained: true
  shared_stages: 3
  branch_a_num_classes: 256
  branch_b_num_classes: 1
  head_hidden_dim: 256
  head_drop_rate: 0.5
  ckpt_path: null

evaluation:
  recog_batch_size: 16
  pad_batch_size: 16
  auth_batch_size: 64
